<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Callout</title>
  <meta name="description" content="Broadcast messages over MQTT — sender and receiver." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <script src="./vendor/tailwindcss-browser.global.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-slate-950: #020617;
    }
  </style>
  <style>
    html, body { height: 100%; overscroll-behavior: none; }
    body { margin: 0; background: #0f172a; }
    [contenteditable][data-placeholder]:empty::before {
      content: attr(data-placeholder);
      color: #64748b;
    }

    .receiver-window {
      --rfs: clamp(3.5rem, 14vw, 11rem);
      height: calc(2 * 1.15 * var(--rfs));
    }
    .receiver-text {
      font-size: var(--rfs);
      line-height: 1.15;
      will-change: transform;
    }
    @media (orientation: portrait) {
      /* Grow with height, but stay capped by a width-based ceiling so
         ordinary words don't outgrow the line and force constant marquee. */
      .receiver-window { --rfs: clamp(3.5rem, min(20vh, 22vw), 11rem); }
    }

    @keyframes status-orb-glow {
      0%, 100% { box-shadow: 0 0 4px 1px var(--orb-glow), 0 0 0 0 var(--orb-glow); }
      50% { box-shadow: 0 0 10px 3px var(--orb-glow), 0 0 0 4px transparent; }
    }
    .status-orb-glow { animation: status-orb-glow 1.8s ease-in-out infinite; }
  </style>

  <script src="./vendor/mqtt.min.js"></script>
  <script src="./vendor/vue.global.prod.js"></script>
  <script src="./vendor/NoSleep.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
